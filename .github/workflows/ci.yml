name: CI / Release

on:
  push:
    branches: [ "main", "dev" ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ "main" ]

# ==============================================================================
# Shared build logic — reused by CI and Release jobs
# ==============================================================================

jobs:

  build:
    name: Build & Test — ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
            artifact_name: RarLib-linux-gcc

          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
            artifact_name: RarLib-linux-clang

          # ── macOS ──────────────────────────────────────────────────────────
          - os: macos-latest
            compiler: clang
            cc: clang
            cxx: clang++
            artifact_name: RarLib-macos-clang

          # ── Windows ────────────────────────────────────────────────────────
          - os: windows-latest
            compiler: msvc
            artifact_name: RarLib-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Configure compiler (Linux / macOS only) ───────────────────────────
      - name: Set compiler env
        if: runner.os != 'Windows'
        run: |
          echo "CC=${{ matrix.cc }}"   >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

      # ── Configure ─────────────────────────────────────────────────────────
      - name: Configure CMake
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          -DRАРLIB_BUILD_TESTS=OFF
          -DRАРLIB_INSTALL=ON
          -DRАРLIB_HEADER_ONLY=ON

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Install into staging dir ──────────────────────────────────────────
      - name: Install
        run: cmake --install build --config Release

      # ── Upload staged install as artifact (used by Release job) ──────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ github.workspace }}/install/**
          retention-days: 7

  # ============================================================================
  # Release — triggered only on vX.Y.Z tags, after all builds succeed
  # ============================================================================

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write   # Required to create releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Download all platform artifacts ───────────────────────────────────
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # ── Package each platform artifact as a .tar.gz / .zip ───────────────
      - name: Package artifacts
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [[ "$name" == *"windows"* ]]; then
              zip -r "../${name}.zip" "$dir"
            else
              tar -czf "../${name}.tar.gz" "$dir"
            fi
          done
          cd ..
          ls -lh *.tar.gz *.zip 2>/dev/null || true

      # ── Extract version from tag (v1.2.3 → 1.2.3) ────────────────────────
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── Create GitHub Release and upload all packages ─────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RarLib v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-beta → prerelease
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip